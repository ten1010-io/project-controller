apiVersion: project.aipub.ten1010.io/v1alpha1
kind: Project
metadata:
  name: proj1
spec:
  members:
    - aipubUser: au1
      role: project-manager
    - aipubUser: au2
      role: project-developer
  quota:
    pvcStorage: 500Gi
    hard:
      cpu:
        requests: "16"
        limits: "32"
      memory:
        requests: 64Gi
        limits: 128Gi
  binding:
    nodes:
      - node1
    nodeGroups:
      - ng1
    imageHubs:
      - img-hub1
---
