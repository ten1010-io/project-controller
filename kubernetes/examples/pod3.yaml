apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-pod-daemonset
  namespace: project-controller
spec:
  selector:
    matchLabels:
      app: nginx-pod-daemonset
  template:
    metadata:
      labels:
        app: nginx-pod-daemonset
    spec:
      containers:
        - name: my-nginx
          image: nginx
