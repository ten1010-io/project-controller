apiVersion: v1
kind: Service
metadata:
  name: {{ include "project-controller.fullname" . }}
  namespace: {{ include "project-controller.namespace" . }}
  labels:
    {{- include "project-controller.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "project-controller.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
