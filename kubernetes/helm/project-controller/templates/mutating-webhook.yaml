{{- if .Values.webhook.admissionReview.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: project-controller.project.aipub.ten1010.io
  labels:
    {{- include "project-controller.labels" . | nindent 4 }}
webhooks:
  - name: pods.project-controller.project.aipub.ten1010.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      {{- include "project-controller.webhookClientConfig" (dict "root" . "path" "/api/v1/admissionreviews") | nindent 6 }}
    failurePolicy: Ignore
    matchPolicy: Equivalent
    namespaceSelector: {}
    objectSelector: {}
    reinvocationPolicy: IfNeeded
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: "*"
    sideEffects: None
    timeoutSeconds: 10
  - name: deployments.project-controller.project.aipub.ten1010.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      {{- include "project-controller.webhookClientConfig" (dict "root" . "path" "/api/v1/admissionreviews") | nindent 6 }}
    failurePolicy: Ignore
    matchPolicy: Equivalent
    namespaceSelector: {}
    objectSelector: {}
    reinvocationPolicy: IfNeeded
    rules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["deployments"]
        scope: "*"
    sideEffects: None
    timeoutSeconds: 10
  - name: namespaces.project-controller.project.aipub.ten1010.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      {{- include "project-controller.webhookClientConfig" (dict "root" . "path" "/api/v1/admissionreviews") | nindent 6 }}
    failurePolicy: Ignore
    matchPolicy: Equivalent
    namespaceSelector: {}
    objectSelector: {}
    reinvocationPolicy: IfNeeded
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["DELETE"]
        resources: ["namespaces"]
        scope: "*"
    sideEffects: None
    timeoutSeconds: 10
  - name: projects.project-controller.project.aipub.ten1010.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      {{- include "project-controller.webhookClientConfig" (dict "root" . "path" "/api/v1/admissionreviews") | nindent 6 }}
    failurePolicy: Fail
    matchPolicy: Equivalent
    namespaceSelector: {}
    objectSelector: {}
    reinvocationPolicy: IfNeeded
    rules:
      - apiGroups: ["project.aipub.ten1010.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["projects"]
        scope: "*"
    sideEffects: None
    timeoutSeconds: 10
  - name: imagereviews.project-controller.project.aipub.ten1010.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      {{- include "project-controller.webhookClientConfig" (dict "root" . "path" "/api/v1/admissionreviews") | nindent 6 }}
    failurePolicy: Fail
    matchPolicy: Equivalent
    namespaceSelector: {}
    objectSelector: {}
    reinvocationPolicy: IfNeeded
    rules:
      - apiGroups: ["project.aipub.ten1010.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE"]
        resources: ["imagereviews"]
        scope: "*"
    sideEffects: None
    timeoutSeconds: 10
{{- end }}
