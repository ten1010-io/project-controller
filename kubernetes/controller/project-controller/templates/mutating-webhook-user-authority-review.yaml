apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: userauthorityreview-mutate.project-controller.project.aipub.ten1010.io
webhooks:
  - name: userauthorityreview-mutate.project-controller.project.aipub.ten1010.io
    admissionReviewVersions: [ "v1" ]
    clientConfig:
      caBundle: <CA_BUNDLE>
      service:
        namespace: project-controller
        name: project-controller
        path: /api/v1/userauthorityreview/mutate
        port: 8080
    failurePolicy: Fail
    matchPolicy: Equivalent
    namespaceSelector: { }
    objectSelector: { }
    reinvocationPolicy: IfNeeded
    rules:
      - apiGroups: [ "aipub.ten1010.io" ]
        apiVersions: [ "*" ]
        operations: [ "CREATE" ]
        resources: [ "userauthorityreviews" ]
        scope: "*"
    sideEffects: None
    timeoutSeconds: 10
