namespace: project-controller
configMapGenerator:
  - name: project-controller-envs
    literals:
      - TZ=Asia/Seoul
      - SERVER_SSL_KEY_STORE=/etc/project-controller/tls/tls.p12
      - APP_AIPUB_ENABLED=false
      - APP_AIPUB_SERVER_URL=http://aipub-backend-gateway.aipub.svc.cluster.local:8080
      - APP_AIPUB_VERIFYING-SSL=false
      - APP_AIPUB_USERNAME=
      - APP_AIPUB_PASSWORD=
      - APP_AIPUB_RESERVED_NAMESPACE=project-controller
secretGenerator:
  - name: project-controller-envs
    literals:
      - SERVER_SSL_KEY_STORE_PASSWORD=""
  - name: project-controller-tls
    files:
      - tls.p12
generatorOptions:
  disableNameSuffixHash: true
resources:
  - templates/namespace.yaml
  - templates/service-account.yaml
  - templates/cluster-role.yaml
  - templates/role.yaml
  - templates/crd.yaml
  - templates/deployment.yaml
  - templates/service.yaml
  - templates/mutating-webhook-configuration.yaml
patchesStrategicMerge:
  - patches.yaml
